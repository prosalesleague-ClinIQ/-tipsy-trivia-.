services:
  - type: web
    name: tipsy-trivia-server
    env: node
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter shared build && pnpm --filter server build
    startCommand: node server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: "production"
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://tipsy-trivia.vercel.app,https://tipsy-trivia-server.onrender.com"
      - key: ELEVENLABS_API_KEY
        sync: false   # set this manually in the Render dashboard

  - type: static_site
    name: tipsy-trivia-client
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter shared build && pnpm --filter client build
    staticPublishPath: ./client/dist
    envVars:
      - key: VITE_SERVER_URL
        fromService:
          type: web
          name: tipsy-trivia-server
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
